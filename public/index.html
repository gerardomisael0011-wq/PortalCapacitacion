<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Capacitación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card" id="login-container">
        <h2>Bienvenido</h2>
        <p>Portal de Capacitación Corporativa</p>
        <input type="text" id="nomina" placeholder="Introduce tu nómina">
        <button class="btn-pending" onclick="ingresar()">Ingresar al Sistema</button>
    </div>

    <script>
        async function ingresar() {
            const nomina = document.getElementById('nomina').value;
            
            // Enviamos la nómina al servidor
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nomina: nomina })
            });

            // Recibimos el HTML con los cursos
            const contenido = await response.text();
            
            if (response.ok) {
                // Aplicamos una clase de contenedor mayor para que los cursos luzcan bien
                const container = document.getElementById('login-container');
                container.style.maxWidth = '600px'; 
                container.innerHTML = contenido;
            } else {
                alert("Nómina no encontrada en el sistema.");
            }
        }
    </script>
</body>
</html>

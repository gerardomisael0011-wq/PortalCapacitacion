<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Capacitación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="app">
        <h1>Portal de Capacitación</h1>
        <p>Bienvenido. Ingrese su nómina:</p>
        <input type="text" id="nomina">
        <button class="btn-pending" onclick="ingresar()">Acceder al Sistema</button>
    </div>

    <script>
        async function ingresar() {
            const nomina = document.getElementById('nomina').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nomina })
            });
            const html = await res.text();
            if (res.ok) {
                // Inyectamos el contenido dentro de la card
                document.getElementById('app').innerHTML = html;
            } else {
                alert("Nómina no encontrada.");
            }
        }
    </script>
</body>
</html>
